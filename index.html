<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Late Night Best Talk Ever Had</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #000;
    --header-bg: #000;
    --you-bubble: linear-gradient(135deg, #9b59b6, #e040fb, #c0397a);
    --them-bubble: #262626;
    --you-text: #fff;
    --them-text: #f5f5f5;
    --timestamp: #555;
    --header-text: #fff;
    --sub-text: #a8a8a8;
    --border: #262626;
    --online: #22c55e;
    --input-bg: #1a1a1a;
    --icon-color: #fff;
  }

  body {
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    max-width: 480px;
    margin: 0 auto;
  }

  /* ── HEADER ── */
  .header {
    background: var(--header-bg);
    padding: 10px 16px 10px 8px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .back-btn {
    color: #fff;
    font-size: 24px;
    cursor: pointer;
    padding: 4px 6px;
    line-height: 1;
    flex-shrink: 0;
  }

  .avatar-wrap {
    position: relative;
    flex-shrink: 0;
  }

  /* Instagram story ring */
  .avatar-ring {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
    padding: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 2px solid #000;
    overflow: hidden;
    display: block;
  }

  .avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .online-dot {
    position: absolute;
    bottom: 2px;
    right: 2px;
    width: 11px;
    height: 11px;
    background: var(--online);
    border-radius: 50%;
    border: 2px solid #000;
  }

  .header-info {
    flex: 1;
    min-width: 0;
  }
  .header-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--header-text);
    line-height: 1.2;
  }
  .header-status {
    font-size: 12px;
    color: var(--sub-text);
    margin-top: 1px;
  }

  .header-actions {
    display: flex;
    gap: 20px;
    align-items: center;
  }

  /* Phone SVG icon */
  .header-actions svg {
    width: 24px;
    height: 24px;
    fill: none;
    stroke: #fff;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
    cursor: pointer;
  }

  /* ── MESSAGES ── */
  .messages-container {
    flex: 1;
    padding: 8px 12px 8px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  /* Date separator */
  .date-sep {
    text-align: center;
    margin: 16px 0 10px;
  }
  .date-sep span {
    font-size: 12px;
    color: var(--sub-text);
    font-weight: 400;
  }

  .msg-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    max-width: 100%;
    opacity: 0;
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  .msg-row.you  { transform: translateX(22px); }
  .msg-row.them { transform: translateX(-22px); }
  .msg-row.visible {
    opacity: 1 !important;
    transform: translateX(0) !important;
  }

  .msg-row.them { justify-content: flex-start; padding-right: 60px; }
  .msg-row.you  { justify-content: flex-end;  padding-left: 60px; }

  .small-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    overflow: hidden;
    flex-shrink: 0;
    margin-bottom: 2px;
  }
  .small-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .small-avatar.hidden { visibility: hidden; }

  .bubble-wrap {
    display: flex;
    flex-direction: column;
    max-width: 100%;
  }
  .msg-row.you .bubble-wrap { align-items: flex-end; }
  .msg-row.them .bubble-wrap { align-items: flex-start; }

  /* Instagram bubble style */
  .bubble {
    padding: 10px 14px;
    border-radius: 22px;
    font-size: 14.5px;
    line-height: 1.45;
    word-break: break-word;
    max-width: 100%;
  }

  .msg-row.you .bubble {
    background: linear-gradient(135deg, #9b59b6, #e040fb 60%, #c0397a);
    color: #fff;
    border-bottom-right-radius: 5px;
  }

  .msg-row.them .bubble {
    background: var(--them-bubble);
    color: var(--them-text);
    border-bottom-left-radius: 5px;
    border: 1px solid #333;
  }

  /* Consecutive messages tighten radius */
  .msg-row.you.continued .bubble {
    border-bottom-right-radius: 22px;
    border-top-right-radius: 5px;
  }
  .msg-row.them.continued .bubble {
    border-bottom-left-radius: 22px;
    border-top-left-radius: 5px;
  }

  /* ── INPUT BAR ── */
  .input-bar {
    padding: 10px 12px 28px;
    background: var(--bg);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    position: sticky;
    bottom: 0;
    z-index: 10;
  }

  .input-wrap {
    flex: 1;
    background: transparent;
    border-radius: 22px;
    display: flex;
    align-items: center;
    padding: 0 14px;
    border: 1.5px solid #363636;
    min-height: 42px;
  }

  .input-wrap input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: #fff;
    font-size: 14px;
    padding: 8px 0;
    font-family: inherit;
  }

  .input-wrap input::placeholder { color: #555; }

  .input-icon {
    color: #a8a8a8;
    font-size: 20px;
    cursor: pointer;
    padding: 0 4px;
    line-height: 1;
  }

  /* Right side icons outside input */
  .bar-icon {
    color: #fff;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .bar-icon svg {
    width: 26px;
    height: 26px;
    fill: none;
    stroke: #fff;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
</style>
</head>

rawMessages.forEach((msg, i) => {
  const isYou = msg.sender === 'HUNAR';
  const prevMsg = rawMessages[i - 1];
  const isContinued = prevMsg && prevMsg.sender === msg.sender;

  const row = document.createElement('div');
  row.className = `msg-row ${isYou ? 'you' : 'them'}${isContinued ? ' continued' : ''}`;

  if (!isYou) {
    const av = document.createElement('div');
    av.className = `small-avatar${isContinued ? ' hidden' : ''}`;
    av.innerHTML = `<img src="${PHOTO}" />`;
    row.appendChild(av);
  }

  const wrap = document.createElement('div');
  wrap.className = 'bubble-wrap';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = msg.text;
  wrap.appendChild(bubble);

  row.appendChild(wrap);
  container.appendChild(row);
});

// Scroll-in reveal — listens on window for iOS compatibility
function revealVisible() {
  const rows = container.querySelectorAll('.msg-row:not(.visible)');
  rows.forEach(row => {
    const rect = row.getBoundingClientRect();
    if (rect.top < window.innerHeight + 40) {
      row.classList.add('visible');
    }
  });
}

window.addEventListener('scroll', revealVisible, { passive: true });
// Run once on load to reveal first messages
setTimeout(revealVisible, 50);

document.getElementById('inputField').addEventListener('keydown', e => {
  if (e.key === 'Enter') sendMsg();
});

function sendMsg() {
  const input = document.getElementById('inputField');
  const text = input.value.trim();
  if (!text) return;
  const row = document.createElement('div');
  row.className = 'msg-row you';
  const wrap = document.createElement('div');
  wrap.className = 'bubble-wrap';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  wrap.appendChild(bubble);
  row.appendChild(wrap);
  container.appendChild(row);
  // Immediately show new sent messages
  requestAnimationFrame(() => row.classList.add('visible'));
  input.value = '';
  window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}
</script>
</body>
</html>
